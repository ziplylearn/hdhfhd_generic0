<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #5390FC 0%, #1267FB 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Logo row: logo + arrow side by side */
    .logo-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .logo {
      width: clamp(120px, 22vw, 200px);
      display: block;
    }

    .arrow {
      width: clamp(22px, 4vw, 38px);
      margin-bottom: 4px;
      display: block;
    }

    .badge-link {
      margin-top: clamp(16px, 3vw, 24px);
      position: relative;
      display: inline-block;
      text-decoration: none;
    }

    .badge-link img.circle {
      width: clamp(140px, 28vw, 200px);
      display: block;
    }

    .badge-link span {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: clamp(13px, 2.2vw, 17px);
      letter-spacing: 0.01em;
      pointer-events: none;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .logo {
        width: 140px;
      }
      .arrow {
        width: 26px;
      }
      .badge-link img.circle {
        width: 160px;
      }
      .badge-link span {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="logo-row">
      <img class="logo" src="img/logoziply.svg" alt="Ziply" />
      <img class="arrow" src="img/freccia.png" alt="" />
    </div>
    <a class="badge-link" href="https://ziplylearn.gumroad.com/l/hkxhy" target="_blank" rel="noopener">
      <img class="circle" src="img/evidenziato.png" alt="i nostri metodi" />
      <span>i nostri metodi</span>
    </a>
  </div>
</body>
</html>
